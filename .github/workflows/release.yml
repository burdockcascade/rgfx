name: Release
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
on:
  push:
    branches:
      - master
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Test
        run: cargo test
  release-please:
    runs-on: ubuntu-latest
    timeout-minutes: 4
    needs: test
    steps:
      - uses: googleapis/release-please-action@v4.2.0
        with:
          release-type: rust